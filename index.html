<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enterprise Digital Experience Engineering Playbook</title>
  <meta name="description" content="Hire-verified AEM and Adobe Experience Manager employers, filterable company list, and a step-by-step apply workflow for Enterprise Digital Experience Engineers." />
  <meta name="keywords" content="AEM jobs, Adobe Experience Manager hiring, enterprise digital experience engineer, AEM careers India, DXP jobs" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#2563eb" />
  <meta property="og:title" content="Enterprise Digital Experience Engineering Playbook" />
  <meta property="og:description" content="Hire-verified AEM employers, filters, and apply workflow for Enterprise Digital Experience Engineers." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Enterprise Digital Experience Engineering Playbook" />
  <meta name="twitter:description" content="Hire-verified AEM employers, filters, and apply workflow for Enterprise Digital Experience Engineers." />
  <link rel="canonical" href="./" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link href="assets/css/site.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
</head>
<body>
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:top-2 focus:left-2 focus:bg-white focus:px-3 focus:py-2 focus:rounded focus:shadow">Skip to content</a>

  <header class="doc-header">
    <div class="doc-header__row">
      <button type="button" class="site-nav-toggle" id="navToggle" aria-label="Open navigation" aria-expanded="false" aria-controls="site-sidebar"></button>
      <div class="site-header-title" id="page-header"></div>
      <div class="doc-header__actions">
        <div id="search-desktop-wrap" class="search-desktop-wrap"></div>
        <div class="doc-header__tools">
          <button type="button" class="command-trigger" id="command-trigger" aria-label="Open search command palette"><span>Search…</span><kbd>Ctrl K</kbd></button>
          <button type="button" class="icon-btn icon-btn--header" id="themeToggle" aria-label="Toggle theme"></button>
        </div>
      </div>
    </div>
    <div class="doc-header__row doc-header__row--search">
      <div id="search-wrap--header" class="w-full"></div>
    </div>
  </header>

  <div id="site-disclaimer"></div>

  <div class="site-nav-backdrop" id="navBackdrop" hidden></div>

  <div class="site-shell">
    <aside class="site-sidebar" id="site-sidebar">
      <h2 class="font-bold mb-3 text-sm uppercase tracking-wide text-muted" id="sidebar-contents-label"></h2>
      <nav id="toc" aria-label="Page contents"></nav>
      <div class="mt-8 text-sm" id="dashboard"></div>
    </aside>
    <main class="site-main" id="main"></main>
  </div>
  <div id="site-footer"></div>

  <div id="command-palette" class="command-palette hidden" aria-hidden="true" role="dialog" aria-label="Search">
    <div class="command-palette__dialog">
      <input type="search" id="command-input" class="command-palette__input" placeholder="Search companies, apply steps, glossary…" autocomplete="off" />
      <div id="command-results"></div>
      <button type="button" class="sr-only" data-command-close>Close</button>
    </div>
  </div>

  <script src="assets/js/icons.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    const PAGE_SIZE = UI.COMPANY_PAGE_SIZE;
    const main = document.getElementById('main');
    const toc = document.getElementById('toc');
    const loadingId = 'data-loading';
    main.innerHTML = `<p id="${loadingId}" role="status">Loading content…</p>`;

    document.getElementById('navToggle').innerHTML = Icons.svg('menu');
    document.getElementById('command-trigger').insertAdjacentHTML('afterbegin', Icons.svg('search'));

    function copyDiscoveryLink(statusEl) {
      const url = window.location.href;
      const done = () => {
        if (statusEl) {
          statusEl.textContent = 'Copied!';
          statusEl.classList.remove('hidden');
          setTimeout(() => statusEl.classList.add('hidden'), 2000);
        }
      };
      if (navigator.clipboard?.writeText) navigator.clipboard.writeText(url).then(done).catch(() => {});
      else {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); done(); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
      }
    }

    function wireCopyDiscoveryLink(root) {
      if (!root) return;
      root.addEventListener('click', e => {
        const btn = e.target.closest('[data-copy-discovery-link]');
        if (!btn || !root.contains(btn)) return;
        e.preventDefault();
        copyDiscoveryLink(root.querySelector('[data-copy-link-status]'));
      });
    }

    function readCompanyFilterState(bar, filterState, defaultSort) {
      if (!bar) return filterState;
      const q = bar.querySelector('input[data-company-filter="query"]');
      filterState.query = q ? q.value : '';
      ['sort', 'companyType', 'industry', 'migrationBand'].forEach(key => {
        const el = bar.querySelector(`input[type="hidden"][data-company-filter="${key}"]`);
        if (el) filterState[key] = el.value;
      });
      if (!filterState.sort) filterState.sort = defaultSort;
      ['hiringIndia', 'hiringAEM', 'aemaaCS', 'verifiedOnly'].forEach(key => {
        filterState[key] = !!bar.querySelector(`[data-company-filter="${key}"][aria-pressed="true"]`)
          || !!bar.querySelector(`input[data-company-filter="${key}"]:checked`);
      });
      return filterState;
    }

    function wireCompanyPagination(allCompanies, industries, filterState, onStateChange, productMode) {
      const container = document.getElementById('company-table-container');
      if (!container) return;
      let page = 1;
      const defaultSort = productMode ? 'hiring-desc' : 'priority-desc';

      function wirePagination() {
        container.querySelectorAll('[data-company-prev]').forEach(btn => {
          btn.onclick = () => { page = Math.max(1, page - 1); renderTable(); };
        });
        container.querySelectorAll('[data-company-next]').forEach(btn => {
          btn.onclick = () => {
            const filtered = CompanyFilters.apply(allCompanies, filterState);
            const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
            page = Math.min(totalPages, page + 1);
            renderTable();
          };
        });
      }

      function renderTable() {
        const bar = container.querySelector('.company-explorer__toolbar');
        readCompanyFilterState(bar, filterState, defaultSort);
        const filtered = CompanyFilters.apply(allCompanies, filterState);
        const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        if (page > totalPages) page = 1;
        const wrap = container.querySelector('.company-table-wrap');
        const opts = { page, productMode, allCompanies };
        if (wrap) wrap.innerHTML = Render.companyDataBody(filtered, opts);
        const countEl = container.querySelector('[data-company-count]');
        if (countEl) countEl.textContent = Render.companyCountLabel(page, filtered.length, allCompanies.length, PAGE_SIZE);
        const pagEl = container.querySelector('[data-company-pagination]');
        if (pagEl) pagEl.innerHTML = Render.companyPagination(page, filtered.length, 'company');
        UI.wireSelects(container);
        wirePagination();
        wireCopyDiscoveryLink(container);
        if (onStateChange) onStateChange();
      }

      function wireToolbar(bar) {
        wireCopyDiscoveryLink(bar);
        bar.addEventListener('click', e => {
          const chip = e.target.closest('[data-company-filter][data-chip]');
          if (!chip || !bar.contains(chip)) return;
          e.preventDefault();
          const key = chip.getAttribute('data-company-filter');
          const next = chip.getAttribute('aria-pressed') !== 'true';
          chip.setAttribute('aria-pressed', next ? 'true' : 'false');
          chip.classList.toggle('filter-chip--active', next);
          filterState[key] = next;
          page = 1;
          renderTable();
        });
        bar.addEventListener('input', e => {
          if (!e.target.matches('[data-company-filter]')) return;
          page = 1;
          renderTable();
        });
        bar.addEventListener('change', e => {
          if (!e.target.matches('[data-company-filter]')) return;
          page = 1;
          renderTable();
        });
      }

      page = 1;
      if (!filterState.sort) filterState.sort = defaultSort;
      const filtered = CompanyFilters.apply(allCompanies, filterState);
      container.innerHTML = Render.companySection(filtered, {
        page, showFilters: true, filterState, totalCount: allCompanies.length, industries, productMode, allCompanies
      });
      UI.wireSelects(container);
      wirePagination();
      wireCopyDiscoveryLink(container);
      const bar = container.querySelector('.company-explorer__toolbar');
      if (bar) wireToolbar(bar);
    }

    function wirePaginatedContainer(containerId, renderFn, data, pageAttr) {
      const container = document.getElementById(containerId);
      if (!container) return;
      let page = 1;
      const attr = pageAttr || containerId.replace('-table-container', '');
      function wirePages() {
        container.querySelectorAll(`[data-${attr}-prev]`).forEach(btn => { btn.onclick = () => { page = Math.max(1, page - 1); render(); }; });
        container.querySelectorAll(`[data-${attr}-next]`).forEach(btn => {
          btn.onclick = () => {
            page = Math.min(Math.max(1, Math.ceil(data.length / 25)), page + 1);
            render();
          };
        });
        container.querySelectorAll(`[data-${attr}-page]`).forEach(btn => {
          btn.onclick = () => { page = parseInt(btn.getAttribute(`data-${attr}-page`), 10); render(); };
        });
      }
      function render() {
        container.innerHTML = renderFn(data, { page, pageSize: 25 });
        wirePages();
      }
      render();
    }

    Promise.all([
      fetch('data/chapters.json').then(r => r.json()),
      fetch('data/companies.json').then(r => r.json()),
      fetch('data/site.json').then(r => r.json()),
      fetch('data/roadmaps.json').then(r => r.json()),
      fetch('data/glossary.json').then(r => r.json()),
      fetch('data/technologies.json').then(r => r.json()),
      fetch('data/career_paths.json').then(r => r.json()),
      fetch('data/interviews.json').then(r => r.json()),
      fetch('data/templates.json').then(r => r.json()),
      fetch('data/resources.json').then(r => r.json()),
      fetch('data/owner_playbook.json').then(r => r.json())
    ]).then(([allChapters, companies, site, roadmaps, glossary, technologies, careerPaths, interviews, templates, resources, ownerPlaybook]) => {
      const productMode = Render.resolveProductMode(site);
      const chapters = Render.chaptersForMode(allChapters, site);
      const learning = { glossary, technologies, careerPaths, interviews, templates, resources };
      const renderOpts = { productMode };
      const ctx = { companies, learning, ownerPlaybook, productMode, roadmaps };
      const stats = Render.companyStats(companies);

      Render.applyHeadMeta(site);
      document.getElementById('page-header').innerHTML = Render.pageHeader(site.header, renderOpts);
      const disclaimerEl = document.getElementById('site-disclaimer');
      if (disclaimerEl) disclaimerEl.innerHTML = Render.disclaimer(site.disclaimer, site.header);

      if (site.header.githubUrl) {
        const actions = document.querySelector('.doc-header__actions');
        const gh = document.createElement('a');
        gh.id = 'github-link';
        gh.className = 'icon-btn icon-btn--header';
        gh.href = site.header.githubUrl;
        gh.setAttribute('aria-label', 'GitHub repository');
        gh.target = '_blank';
        gh.rel = 'noopener noreferrer';
        gh.innerHTML = Icons.svg('github');
        actions.appendChild(gh);
      }

      document.getElementById('search-wrap--header').innerHTML = Render.search(site.search, 'search-wrap-header-inner', '-mobile');
      document.getElementById('search-desktop-wrap').innerHTML = Render.search(site.search, 'search-wrap', '-desktop');

      document.getElementById('sidebar-contents-label').textContent = site.sidebar.contentsLabel;
      const dashboardEl = document.getElementById('dashboard');
      if (productMode) { dashboardEl.innerHTML = ''; dashboardEl.hidden = true; }
      else { dashboardEl.hidden = false; dashboardEl.innerHTML = Render.dashboard(site.dashboard); }

      const groups = site.navigation?.groups;
      toc.innerHTML = groups ? Render.sidebarGrouped(chapters, groups) : Render.sidebar(chapters);

      const chaptersHtml = chapters.map((c, i) => Render.chapter(c, i, ctx)).join('');
      const roadmapsHtml = productMode ? '' : Render.roadmapList(roadmaps, renderOpts);
      main.innerHTML = Render.hero(site.hero, renderOpts, stats) + roadmapsHtml + chaptersHtml;
      document.getElementById('site-footer').innerHTML = Render.footer(site.footer);

      const searchIndex = Search.buildIndex({ chapters, companies, roadmaps, site, learning, ownerPlaybook });
      const industries = CompanyFilters.industriesFrom(companies);
      const companiesById = CompanyFilters.companiesById(companies);
      const urlParsed = CompanyFilters.parseUrlState(location.search);
      const filterState = urlParsed.state;
      filterState.sourceFilter = '';
      if (productMode && !location.search.includes('sort=')) filterState.sort = 'hiring-desc';
      const searchFacetState = { sourceFilter: '' };

      const refreshSearch = UI.wireSiteSearch({
        searchIndex,
        companiesById,
        searchFacetState,
        filterState,
        wrapIds: ['search-wrap', 'search-wrap-header-inner'],
        initialQuery: urlParsed.searchQuery,
        onCopyLink: wireCopyDiscoveryLink,
        onUrlSync: q => {
          history.replaceState(null, '', location.pathname + CompanyFilters.serializeUrlState(filterState, q || '') + location.hash);
        }
      });

      wireCompanyPagination(companies, industries, filterState, () => {
        const q = document.getElementById('search-mobile')?.value
          || document.getElementById('search-desktop')?.value || '';
        history.replaceState(null, '', location.pathname + CompanyFilters.serializeUrlState(filterState, q) + location.hash);
        if (refreshSearch) refreshSearch();
      }, productMode);

      wirePaginatedContainer('glossary-table-container', Render.glossaryTable, glossary, 'glossary');
      wirePaginatedContainer('interview-table-container', Render.interviewList, interviews, 'interview');

      UI.initTheme('themeToggle');
      UI.wireNavDrawer();
      UI.wireNavGroups();
      UI.wireInPageAnchors();
      UI.wireOwnerPlaybookNav();
      UI.wireScrollSpy();
      UI.wireCommandPalette({ searchIndex, companiesById, searchFacetState });
    }).catch(err => {
      const el = document.getElementById(loadingId);
      if (el) { el.setAttribute('role', 'alert'); el.textContent = 'Failed to load content. Serve over HTTP — see .playbook/17_TESTING_GUIDE.md.'; }
      console.error(err);
      UI.initTheme('themeToggle');
    });
  </script>
</body>
</html>
