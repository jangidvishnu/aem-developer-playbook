<!DOCTYPE html>

<html lang="en">

<head><!--
VERSION 4.0.0
Governance and architecture now live in .playbook/ (see MASTER_BOOTSTRAP_PROMPT.md
and 01_AI_CONSTITUTION.md) rather than duplicated here. Do not restate rules in
this file — update .playbook/ and reference it instead.
-->
  <meta charset="utf-8" />
  <meta content="width=device-width,initial-scale=1" name="viewport" />
  <title>Enterprise Digital Experience Engineering Playbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <style>
    html {
      scroll-behavior: smooth
    }

    body {
      font-family: Inter, sans-serif
    }

    .section {
      scroll-margin-top: 90px
    }

    .callout {
      border-left: 4px solid #2563eb
    }

    code {
      background: #eef2ff;
      padding: .1rem .3rem;
      border-radius: .25rem
    }

    @media print {

      aside,
      header,
      #themeToggle,
      #search,
      #site-footer {
        display: none !important
      }

      section {
        box-shadow: none !important;
        break-inside: avoid-page
      }
    }
  </style>
</head>

<body class="bg-slate-100 text-slate-800">
  <a href="#main"
    class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:top-2 focus:left-2 focus:bg-white focus:text-slate-800 focus:px-3 focus:py-2 focus:rounded focus:shadow">Skip
    to content</a>
  <header class="sticky top-0 z-50 bg-white border-b">
    <div class="max-w-7xl mx-auto flex items-center justify-between p-4">
      <div id="page-header"></div>
      <div class="flex items-center">
        <div id="search-container"></div>
        <button class="ml-3 border rounded px-3 py-2 bg-white" id="themeToggle"
          aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>
  <div class="max-w-7xl mx-auto flex gap-6 p-6">
    <aside class="w-72 shrink-0 bg-white rounded-xl shadow p-5 sticky top-24 h-[82vh] overflow-auto text-slate-800">
      <h2 class="font-bold mb-3" id="sidebar-contents-label"></h2>
      <div id="toc"></div>
      <div class="mt-8 text-sm" id="dashboard"></div>
    </aside>
    <main class="flex-1 space-y-6" id="main"></main>
  </div>
  <div id="site-footer"></div>
  <script src="assets/js/render.js"></script>
  <script>
    // Content data lives in data/*.json (Milestones 3–4 — see 12_DECISIONS.md DR-005).
    // Render functions live in assets/js/render.js (Milestone 4 — see 10_COMPONENT_LIBRARY.md).
    // Fetching local files requires a server; file:// triggers the error state below.
    const toc = document.getElementById('toc');
    const main = document.getElementById('main');
    const loadingId = 'data-loading';

    main.innerHTML = `<p id="${loadingId}" class="text-slate-500 p-4" role="status">Loading content…</p>`;

    function wireSearch() {
      document.getElementById('search').oninput = e => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('main section').forEach(s => {
          s.style.display = s.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
      };
    }

    function wireTheme() {
      const b = document.body;
      document.getElementById('themeToggle').onclick = () => {
        document.documentElement.classList.toggle('dark');
        if (document.documentElement.classList.contains('dark')) {
          b.className = 'bg-slate-900 text-slate-100';
          localStorage.theme = 'dark';
        } else {
          b.className = 'bg-slate-100 text-slate-800';
          localStorage.theme = 'light';
        }
      };
      if (localStorage.theme === 'dark') document.getElementById('themeToggle').click();
    }

    Promise.all([
      fetch('data/chapters.json').then(r => r.json()),
      fetch('data/companies.json').then(r => r.json()),
      fetch('data/site.json').then(r => r.json()),
      fetch('data/roadmaps.json').then(r => r.json())
    ]).then(([chapters, companies, site, roadmaps]) => {
      document.title = site.documentTitle;
      document.getElementById('page-header').innerHTML = Render.pageHeader(site.header);
      document.getElementById('search-container').innerHTML = Render.search(site.search);
      document.getElementById('sidebar-contents-label').textContent = site.sidebar.contentsLabel;
      document.getElementById('dashboard').innerHTML = Render.dashboard(site.dashboard);
      toc.innerHTML = Render.sidebar(chapters);
      const chaptersHtml = chapters.map((c, i) => Render.chapter(c, i, companies)).join('');
      main.innerHTML = Render.hero(site.hero) + Render.roadmap(roadmaps[0]) + chaptersHtml;
      document.getElementById('site-footer').innerHTML = Render.footer(site.footer);
      wireSearch();
      wireTheme();
    }).catch(err => {
      const el = document.getElementById(loadingId);
      el.setAttribute('role', 'alert');
      el.textContent = 'Failed to load content. If you opened this file directly (file://), serve it from a local server instead — see .playbook/17_TESTING_GUIDE.md.';
      console.error(err);
      wireTheme();
    });
  </script>
</body>

</html>
