<!DOCTYPE html>

<html lang="en">

<head><!--
VERSION 4.0.0
Governance and architecture now live in .playbook/ (see MASTER_BOOTSTRAP_PROMPT.md
and 01_AI_CONSTITUTION.md) rather than duplicated here. Do not restate rules in

  <meta charset="utf-8" />
  <meta content="width=device-width,initial-scale=1" name="viewport" />
  <title>Enterprise Digital Experience Engineering Playbook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <style>
    html {
      scroll-behavior: smooth
    }

    body {
      font-family: Inter, sans-serif
    }

    .section {
      scroll-margin-top: 90px
    }

    .callout {
      border-left: 4px solid #2563eb
    }

    code {
      background: #eef2ff;
      padding: .1rem .3rem;
      border-radius: .25rem
    }

    @media print {

      aside,
      header,
      #themeToggle,
      #search-wrap,
      #site-footer {
        display: none !important
      }

      section {
        box-shadow: none !important;
        break-inside: avoid-page
      }
    }
  </style>

<body class="bg-slate-100 text-slate-800">
  <a href="#main"
    class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:top-2 focus:left-2 focus:bg-white focus:text-slate-800 focus:px-3 focus:py-2 focus:rounded focus:shadow">Skip
    to content</a>
  <header class="sticky top-0 z-50 bg-white border-b">
    <div class="max-w-7xl mx-auto flex items-center justify-between p-4">
      <div id="page-header"></div>
      <div class="flex items-center">
        <div id="search-container"></div>
        <button class="ml-3 border rounded px-3 py-2 bg-white" id="themeToggle"
          aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>
  <div class="max-w-7xl mx-auto flex gap-6 p-6">
    <aside class="w-72 shrink-0 bg-white rounded-xl shadow p-5 sticky top-24 h-[82vh] overflow-auto text-slate-800">
      <h2 class="font-bold mb-3" id="sidebar-contents-label"></h2>
      <div id="toc"></div>
      <div class="mt-8 text-sm" id="dashboard"></div>
    </aside>
    <main class="flex-1 space-y-6" id="main"></main>
  </div>
  <div id="site-footer"></div>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/search.js"></script>
  <script>
    // Content data lives in data/*.json (Milestones 3–4 — see 12_DECISIONS.md DR-005).
    // Render functions live in assets/js/render.js (Milestone 4 — see 10_COMPONENT_LIBRARY.md).
    // Fetching local files requires a server; file:// triggers the error state below.
    const toc = document.getElementById('toc');
    const main = document.getElementById('main');
    const loadingId = 'data-loading';

    main.innerHTML = `<p id="${loadingId}" class="text-slate-500 p-4" role="status">Loading content…</p>`;

    function copyDiscoveryLink(statusEl) {
      const url = window.location.href;
      const done = () => {
        if (statusEl) {
          statusEl.textContent = 'Copied!';
          statusEl.classList.remove('hidden');
          setTimeout(() => statusEl.classList.add('hidden'), 2000);
        }
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done).catch(() => {});
      } else {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); done(); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
      }
    }

    function wireCopyDiscoveryLink(root) {
      if (!root) return;
      root.addEventListener('click', e => {
        const btn = e.target.closest('[data-copy-discovery-link]');
        if (!btn || !root.contains(btn)) return;
        e.preventDefault();
        e.stopPropagation();
        const status = root.querySelector('[data-copy-link-status]');
        copyDiscoveryLink(status);
      });
    }

    function wireSearch(searchIndex, chapters, ctx) {
      const wrap = document.getElementById('search-wrap');
      const input = document.getElementById('search');
      const clearBtn = document.getElementById('search-clear');
      const searchPanel = document.getElementById('search-panel');
      const facetsEl = document.getElementById('search-facets');
      const panel = document.getElementById('search-results');
      const status = document.getElementById('search-status');
      const filterState = ctx.filterState;
      const companiesById = ctx.companiesById;
      let results = [];
      let rawCount = 0;
      let activeIndex = -1;
      let panelOpen = false;

      function syncUrl() {
        if (ctx.onUrlSync) ctx.onUrlSync(input.value);
      }

      function updateClearButton() {
        clearBtn.classList.toggle('hidden', !input.value.trim());
      }

      function closePanel() {
        panelOpen = false;
        searchPanel.classList.add('hidden');
        input.setAttribute('aria-expanded', 'false');
      }

      function openPanel() {
        const q = input.value.trim();
        if (!q) {
          closePanel();
          return;
        }
        panelOpen = true;
        searchPanel.classList.remove('hidden');
        input.setAttribute('aria-expanded', 'true');
      }

      function renderFacets() {
        facetsEl.innerHTML = Render.searchFacets(filterState);
        facetsEl.querySelectorAll('[data-search-facet]').forEach(btn => {
          btn.onclick = e => {
            e.stopPropagation();
            const key = btn.getAttribute('data-search-facet');
            filterState[key] = btn.getAttribute('data-value') || '';
            syncUrl();
            runQuery();
          };
        });
      }

      function statusText(q) {
        if (!q.trim()) return '';
        if (!results.length) return rawCount ? 'No results match filters' : 'No results';
        if (rawCount > results.length) {
          return results.length + ' of ' + rawCount + ' results';
        }
        return results.length + ' result' + (results.length === 1 ? '' : 's');
      }

      function renderPanel() {
        const q = input.value;
        renderFacets();
        panel.innerHTML = Render.searchResults(results, q, activeIndex);
        updateClearButton();
        if (panelOpen && q.trim()) {
          searchPanel.classList.remove('hidden');
          input.setAttribute('aria-expanded', 'true');
        } else if (!q.trim()) {
          closePanel();
        }
        status.textContent = statusText(q);
        panel.querySelectorAll('[role="option"]').forEach((btn, i) => {
          btn.onclick = e => {
            e.stopPropagation();
            activateResult(i);
          };
        });
      }

      function activateResult(i) {
        if (i < 0 || i >= results.length) return;
        const r = results[i];
        const el = document.querySelector(r.anchor);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          el.classList.add('ring-2', 'ring-blue-400');
          setTimeout(() => el.classList.remove('ring-2', 'ring-blue-400'), 2000);
        }
        closePanel();
        input.blur();
      }

      function clearSearch() {
        input.value = '';
        results = [];
        rawCount = 0;
        activeIndex = -1;
        closePanel();
        syncUrl();
        renderPanel();
        input.focus();
      }

      function runQuery() {
        const q = input.value.trim();
        updateClearButton();
        if (!q) {
          results = [];
          rawCount = 0;
          activeIndex = -1;
          closePanel();
          renderPanel();
          syncUrl();
          return;
        }
        const raw = Search.query(searchIndex, q);
        rawCount = raw.length;
        results = CompanyFilters.filterSearchResults(raw, companiesById, filterState);
        activeIndex = results.length ? 0 : -1;
        panelOpen = true;
        renderPanel();
        syncUrl();
      }

      clearBtn.addEventListener('click', e => {
        e.stopPropagation();
        clearSearch();
      });

      input.addEventListener('input', runQuery);

      input.addEventListener('focus', () => {
        if (input.value.trim()) {
          panelOpen = true;
          openPanel();
          renderPanel();
        }
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if (input.value.trim()) {
            clearSearch();
          } else {
            closePanel();
            input.blur();
          }
          return;
        }
        if (!results.length || !panelOpen) return;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, results.length - 1);
          renderPanel();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
          renderPanel();
        } else if (e.key === 'Enter' && activeIndex >= 0) {
          e.preventDefault();
          activateResult(activeIndex);
        }
      });

      document.addEventListener('click', e => {
        if (!wrap.contains(e.target)) closePanel();
      });

      wireCopyDiscoveryLink(facetsEl);

      ctx.refreshSearch = runQuery;

      if (ctx.initialQuery) {
        input.value = ctx.initialQuery;
        runQuery();
      }
    }

    function wireCompanyPagination(allCompanies, industries, filterState, onStateChange) {
      const container = document.getElementById('company-table-container');
      if (!container) return;
      let page = 1;

      function readStateFromDom() {
        const bar = container.querySelector('.company-filters');
        if (!bar) return filterState;
        const q = bar.querySelector('[data-company-filter="query"]');
        const type = bar.querySelector('[data-company-filter="companyType"]');
        const industry = bar.querySelector('[data-company-filter="industry"]');
        const migration = bar.querySelector('[data-company-filter="migrationBand"]');
        const sort = bar.querySelector('[data-company-filter="sort"]');
        filterState.query = q ? q.value : '';
        filterState.companyType = type ? type.value : '';
        filterState.industry = industry ? industry.value : '';
        filterState.migrationBand = migration ? migration.value : '';
        filterState.sort = sort ? sort.value : 'priority-desc';
        filterState.hiringIndia = !!bar.querySelector('[data-company-filter="hiringIndia"]')?.checked;
        filterState.hiringAEM = !!bar.querySelector('[data-company-filter="hiringAEM"]')?.checked;
        filterState.aemaaCS = !!bar.querySelector('[data-company-filter="aemaaCS"]')?.checked;
        filterState.verifiedOnly = !!bar.querySelector('[data-company-filter="verifiedOnly"]')?.checked;
        return filterState;
      }

      function updateCount(filteredLen) {
        const countEl = container.querySelector('.company-filters p.text-xs');
        if (countEl) {
          countEl.textContent = `${filteredLen} of ${allCompanies.length} companies shown`;
        }
      }

      function wirePageButtons() {
        container.querySelectorAll('[data-company-page]').forEach(btn => {
          btn.onclick = () => {
            page = parseInt(btn.getAttribute('data-company-page'), 10);
            renderTable();
          };
        });
      }

      function notifyChange() {
        readStateFromDom();
        if (onStateChange) onStateChange();
      }

      /** Update table + pagination only — keep filter bar in DOM so search input keeps focus. */
      function renderTable() {
        readStateFromDom();
        const filtered = CompanyFilters.apply(allCompanies, filterState);
        const totalPages = Math.max(1, Math.ceil(filtered.length / 25));
        if (page > totalPages) page = 1;
        const wrap = container.querySelector('.company-table-wrap');
        if (wrap) {
          wrap.innerHTML = Render.companyTable(filtered, { page });
        }
        updateCount(filtered.length);
        wirePageButtons();
      }

      function init() {
        page = 1;
        const filtered = CompanyFilters.apply(allCompanies, filterState);
        container.innerHTML = Render.companySection(filtered, {
          page,
          showFilters: true,
          filterState,
          totalCount: allCompanies.length,
          industries
        });
        wirePageButtons();
        const bar = container.querySelector('.company-filters');
        if (bar) {
          wireCopyDiscoveryLink(bar);
          bar.addEventListener('input', e => {
            if (!e.target.matches('[data-company-filter]')) return;
            if (e.target.type === 'checkbox') return;
            page = 1;
            renderTable();
            notifyChange();
          });
          bar.addEventListener('change', e => {
            if (!e.target.matches('[data-company-filter]')) return;
            page = 1;
            renderTable();
            notifyChange();
          });
        }
      }
      init();
    }

    function wirePaginatedContainer(containerId, renderFn, data, pageAttr) {
      const container = document.getElementById(containerId);
      if (!container) return;
      let page = 1;
      const attr = pageAttr || containerId.replace('-table-container', '');
      function render() {
        container.innerHTML = renderFn(data, { page });
        container.querySelectorAll(`[data-${attr}-page]`).forEach(btn => {
          btn.onclick = () => {
            page = parseInt(btn.getAttribute(`data-${attr}-page`), 10);
            render();
          };
        });
      }
      render();
    }

    function wireTheme() {
      const b = document.body;
      document.getElementById('themeToggle').onclick = () => {
        document.documentElement.classList.toggle('dark');
        if (document.documentElement.classList.contains('dark')) {
          b.className = 'bg-slate-900 text-slate-100';
          localStorage.theme = 'dark';
        } else {
          b.className = 'bg-slate-100 text-slate-800';
          localStorage.theme = 'light';
        }
      };
      if (localStorage.theme === 'dark') document.getElementById('themeToggle').click();
    }

    Promise.all([
      fetch('data/chapters.json').then(r => r.json()),
      fetch('data/companies.json').then(r => r.json()),
      fetch('data/site.json').then(r => r.json()),
      fetch('data/roadmaps.json').then(r => r.json()),
      fetch('data/glossary.json').then(r => r.json()),
      fetch('data/technologies.json').then(r => r.json()),
      fetch('data/career_paths.json').then(r => r.json()),
      fetch('data/interviews.json').then(r => r.json()),
      fetch('data/templates.json').then(r => r.json()),
      fetch('data/resources.json').then(r => r.json())
    ]).then(([chapters, companies, site, roadmaps, glossary, technologies, careerPaths, interviews, templates, resources]) => {
      const learning = { glossary, technologies, careerPaths, interviews, templates, resources };
      const ctx = { companies, learning };
      document.title = site.documentTitle;
      document.getElementById('page-header').innerHTML = Render.pageHeader(site.header);
      document.getElementById('search-container').innerHTML = Render.search(site.search);
      document.getElementById('sidebar-contents-label').textContent = site.sidebar.contentsLabel;
      document.getElementById('dashboard').innerHTML = Render.dashboard(site.dashboard);
      toc.innerHTML = Render.sidebar(chapters);
      const chaptersHtml = chapters.map((c, i) => Render.chapter(c, i, ctx)).join('');
      main.innerHTML = Render.hero(site.hero) + Render.roadmapList(roadmaps) + chaptersHtml;
      document.getElementById('site-footer').innerHTML = Render.footer(site.footer);
      const searchIndex = Search.buildIndex({ chapters, companies, roadmaps, site, learning });
      const industries = CompanyFilters.industriesFrom(companies);
      const companiesById = CompanyFilters.companiesById(companies);
      const urlParsed = CompanyFilters.parseUrlState(location.search);
      const filterState = urlParsed.state;
      const searchCtx = {
        filterState,
        companiesById,
        initialQuery: urlParsed.searchQuery
      };
      function syncDiscoveryUrl(searchQuery) {
        const qs = CompanyFilters.serializeUrlState(filterState, searchQuery || '');
        history.replaceState(null, '', location.pathname + qs + location.hash);
      }
      searchCtx.onUrlSync = syncDiscoveryUrl;
      wireSearch(searchIndex, chapters, searchCtx);
      wireCompanyPagination(companies, industries, filterState, () => {
        syncDiscoveryUrl(document.getElementById('search')?.value || '');
        if (searchCtx.refreshSearch) searchCtx.refreshSearch();
      });
      wirePaginatedContainer('glossary-table-container', Render.glossaryTable, glossary, 'glossary');
      wirePaginatedContainer('interview-table-container', Render.interviewList, interviews, 'interview');
      wireTheme();
    }).catch(err => {
      const el = document.getElementById(loadingId);
      el.setAttribute('role', 'alert');
      el.textContent = 'Failed to load content. If you opened this file directly (file://), serve it from a local server instead — see .playbook/17_TESTING_GUIDE.md.';
      console.error(err);
      wireTheme();
    });
  </script>
</body>

</html>
